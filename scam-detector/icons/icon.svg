<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle for icon visibility -->
  <circle cx="64" cy="64" r="64" fill="white" opacity="0.1"/>
  
  <!-- Shield shape -->
  <path d="M 64 8 C 64 8 32 24 32 48 C 32 72 64 112 64 112 C 64 112 96 72 96 48 C 96 24 64 8 64 8 Z" 
        fill="url(#shieldGradient)" 
        stroke="#1e40af" 
        stroke-width="2"/>
  
  <!-- Checkmark inside shield -->
  <g transform="translate(64, 64)">
    <!-- Checkmark circle background -->
    <circle cx="0" cy="0" r="28" fill="url(#accentGradient)" opacity="0.2"/>
    
    <!-- Checkmark -->
    <path d="M -10 0 L -2 8 L 14 -8" 
          stroke="white" 
          stroke-width="3" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"/>
  </g>
  
  <!-- Shine effect for 3D depth -->
  <ellipse cx="50" cy="35" rx="15" ry="10" fill="white" opacity="0.15"/>
</svg>